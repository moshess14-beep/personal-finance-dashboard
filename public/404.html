<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>מעקב הון אישי</title>
    <script>
      // GitHub Pages has no server-side routing, so a direct load or refresh
      // on a client-side route (e.g. /assets) 404s here. Encode the intended
      // path into a query string and redirect to the real app, which decodes
      // it back (see the matching script in index.html) before React Router
      // mounts. Pattern: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // keep "/personal-finance-dashboard"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
